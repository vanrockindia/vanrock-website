<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>VanRock | Stainless Steel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 5rem; letter-spacing: 15px; color: #fff; margin: 0; }
        .products { padding: 100px 50px; background: rgba(0,0,0,0.8); display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { border: 1px solid #444; padding: 40px; border-radius: 5px; background: #111; }
        .card h3 { color: #ff4500; }
    </style>
</head>
<body>
    <div class="hero"><h1>VANROCK</h1><p>3D DESIGNED STAINLESS STEEL</p></div>
    <div class="products">
        <div class="card"><h3>Industrial Pipes</h3><p>Seamless 304/316 Stainless Steel.</p></div>
        <div class="card"><h3>Custom Fittings</h3><p>Precision 3D engineered components.</p></div>
        <div class="card"><h3>Steel Sheets</h3><p>High-grade architectural finishes.</p></div>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1, roughness: 0.1 });
        const obj = new THREE.Mesh(geometry, material);
        scene.add(obj);
        const light = new THREE.PointLight(0xffffff, 2, 100); light.position.set(10,10,10); scene.add(light);
        camera.position.z = 40;
        function animate() { requestAnimationFrame(animate); obj.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
