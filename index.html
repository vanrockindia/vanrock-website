<!DOCTYPE html>
<html>
<head>
    <title>VanRock Industrial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        .ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        h1 { font-size: 80px; margin: 0; letter-spacing: 10px; color: #ff4500; text-shadow: 0 0 20px #ff4500; }
    </style>
</head>
<body>
    <div class="ui"><h1>VANROCK</h1><p>INDUSTRIAL SOLUTIONS</p></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ color: 0xff4500, metalness: 0.7, roughness: 0.2 });
        const obj = new THREE.Mesh(geometry, material);
        scene.add(obj);
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
        camera.position.z = 30;
        function animate() { requestAnimationFrame(animate); obj.rotation.x += 0.01; obj.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
