<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanRock | 3D Industrial Excellence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4500; text-align: center; pointer-events: none; z-index: 10; }
        h1 { font-size: 5rem; letter-spacing: 15px; text-transform: uppercase; margin: 0; text-shadow: 0 0 30px #ff4500; }
        p { color: #fff; letter-spacing: 3px; font-weight: 300; }
    </style>
</head>
<body>
    <div class="overlay"><h1>VanRock</h1><p>3D INDUSTRIAL SOLUTIONS</p></div>
    <div id="canvas-container"></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ color: 0xff4500, emissive: 0xff1100, metalness: 1, roughness: 0.1 });
        const knot = new THREE.Mesh(geometry, material);
        scene.add(knot);
        const light = new THREE.PointLight(0xffffff, 1.5, 100);
        light.position.set(20, 20, 20);
        scene.add(knot);
        scene.add(new THREE.AmbientLight(0x222222));
        camera.position.z = 40;
        function animate() { requestAnimationFrame(animate); knot.rotation.x += 0.005; knot.rotation.y += 0.01; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
